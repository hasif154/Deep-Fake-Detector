# logging.yaml
# Logging configuration for standard Python logging module
version: 1
disable_existing_loggers: False

formatters:
  standard:
    format: "%(asctime)s [%(levelname)s] %(name)s: %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"

handlers:
  console:
    class: "logging.StreamHandler"
    level: "INFO"
    formatter: "standard"
    stream: "ext://sys.stdout"
  
  file:
    class: "logging.handlers.RotatingFileHandler"
    level: "DEBUG"
    formatter: "standard"
    filename: "outputs/logs/deepfake_detector.log"
    maxBytes: 10485760 # 10MB
    backupCount: 5
    encoding: "utf8"

root:
  level: "DEBUG"
  handlers:
    - "console"
    - "file"
