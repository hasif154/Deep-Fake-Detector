# training.yaml
# Configuration for model compiling and training loops
training:
  # Selected model name (e.g., mobilenet, efficientnet)
  model_name: "mobilenet"
  
  # Image sizes
  img_height: 224
  img_width: 224
  img_channels: 3
  
  # Hyperparameters
  batch_size: 32
  epochs: 20
  learning_rate: 0.0001
  
  # Train / Validation / Test split ratios
  split_ratios:
    train: 0.7
    validation: 0.15
    test: 0.15
    
  # Callbacks settings
  early_stopping:
    patience: 5
    monitor: "val_loss"
    
  model_checkpoint:
    save_best_only: true
    monitor: "val_loss"
